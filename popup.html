<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Readable Web</title>
  <style>
    body {
      width: 300px;
      margin: 0;
      padding: 14px 14px 12px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      color: #1a1a1a;
      background: #fafafa;
    }
    h1 {
      font-size: 14px;
      margin: 0 0 12px;
      font-weight: 600;
    }
    label.field {
      display: block;
      font-size: 12px;
      font-weight: 500;
      margin: 10px 0 4px;
      color: #444;
    }
    select, button {
      width: 100%;
      padding: 6px 8px;
      font-size: 13px;
      border: 1px solid #ccc;
      border-radius: 4px;
      background: #fff;
      box-sizing: border-box;
    }
    .row {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 6px 0;
    }
    .row input[type="range"] { flex: 1; }
    .row .val {
      min-width: 44px;
      text-align: right;
      font-variant-numeric: tabular-nums;
      font-size: 12px;
      color: #555;
    }
    .toggle {
      display: flex;
      align-items: center;
      gap: 8px;
      margin: 8px 0;
    }
    .toggle input { margin: 0; }
    .toggle label { font-size: 12px; margin: 0; cursor: pointer; }
    .preset-row {
      display: flex;
      gap: 4px;
      margin-top: 6px;
    }
    .preset-row button {
      flex: 1;
      padding: 4px;
      font-size: 11px;
      cursor: pointer;
    }
    .preset-row button:hover { background: #eee; }
    .btn-row {
      display: flex;
      gap: 6px;
      margin-top: 12px;
    }
    .btn-row button {
      cursor: pointer;
      background: #f0f0f0;
    }
    .btn-row button:hover { background: #e5e5e5; }
    .hint {
      font-size: 11px;
      color: #777;
      margin-top: 10px;
      line-height: 1.4;
    }
    .site-status {
      font-size: 11px;
      color: #555;
      margin-top: 8px;
      padding: 6px 8px;
      background: #eef;
      border-radius: 4px;
    }
    .site-status.disabled { background: #fee; color: #800; }
    #siteHost { font-weight: 600; }
  </style>
</head>
<body>
  <h1>Readable Web</h1>

  <div class="toggle">
    <input type="checkbox" id="enabled" checked>
    <label for="enabled">Enable font override (globally)</label>
  </div>

  <label class="field" for="fontKey">Body font</label>
  <select id="fontKey">
    <option value="default">Site default (no override)</option>
    <option value="fast_sans">Fast Sans (bionic)</option>
    <option value="fast_sans_dotted">Fast Sans Dotted (bionic)</option>
    <option value="fast_serif">Fast Serif (bionic)</option>
    <option value="fast_opendyslexic">Fast OpenDyslexic (bionic)</option>
    <option value="atkinson">Atkinson Hyperlegible</option>
  </select>

  <label class="field" for="size">Font size</label>
  <div class="row">
    <input type="range" id="size" min="75" max="200" step="5" value="100">
    <span class="val" id="sizeVal">100%</span>
  </div>
  <div class="preset-row">
    <button data-size="100">100%</button>
    <button data-size="110">110%</button>
    <button data-size="125">125%</button>
    <button data-size="150">150%</button>
  </div>

  <div class="toggle" style="margin-top: 12px;">
    <input type="checkbox" id="overrideHeadings">
    <label for="overrideHeadings">Also override headings (h1–h6)</label>
  </div>

  <div class="site-status" id="siteStatus">
    On this site: <span id="siteHost">—</span> <span id="siteState">(active)</span>
  </div>

  <div class="btn-row">
    <button id="toggleSite">Disable on this site</button>
    <button id="reset">Reset</button>
  </div>

  <div class="hint">Code blocks always stay monospace. Settings sync across signed-in browsers.</div>

  <script src="popup.js"></script>
</body>
</html>
